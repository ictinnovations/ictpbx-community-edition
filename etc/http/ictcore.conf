Alias /api /usr/ictcore/wwwroot

<Directory /usr/ictcore/wwwroot>
    SetEnv PHP_ADMIN_VALUE "open_basedir = /usr/ictcore/:/usr/bin:/bin:/tmp/"

    Options Indexes FollowSymLinks Includes
    AllowOverride All
    <IfVersion < 2.4>
        Allow from all
    </IfVersion>
    <IfVersion >= 2.4>
        Require all granted
    </IfVersion>
</Directory>

Alias /fusionpbx /var/www/fusionpbx
<Directory /var/www/fusionpbx>
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>
