<VirtualHost *:80>
    DocumentRoot /var/www/fusionpbx
    ServerName localhost
    ServerAlias ictpbx.local

    <Directory /var/www/fusionpbx>
        Options Indexes FollowSymLinks MultiViews
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog /var/log/httpd/fusionpbx_error.log
    CustomLog /var/log/httpd/fusionpbx_access.log combined
</VirtualHost>
